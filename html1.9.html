<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/css1.9.css">
    <title>Document</title>
</head>
<body>
    <section class="wrapper-main">
        <table> <!--tabulka - table, tr - table trow, td - table data-->
            <colgroup> <!--skupina stĺpcov-->
                <col span="2" style="background-color: aquamarine;">
                <col span="2" style="background-color: aqua;">
            </colgroup> 
            <tr>
                <th colspan="2">Meno</th> <!--table header - th, moze byt vertikalne aj horizontalne-->
                <th>Farba vlasov</th> <!--dá sa nastaviť koľko políčok zaberá každý prvok-->
                <th>Vek</th>
            </tr>
            <tr>
                <td>Michal</td>
                <td>Vojáček</td>
                <td>tmavá hnedá</td>
                <td>21 rokov</td>
            </tr>
            <tr>
                <td>Patrik</td>
                <td>Talaš</td>
                <td>hnedá</td>
                <td>21 rokov</td>
            </tr>
        </table>
    </section>
</body>
</html>
